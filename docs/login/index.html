<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src 'self' https://sar1a.lempyra.com; font-src 'self' https://fonts.gstatic.com; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src 'self' data: blob:;">
<title>jezabel · access</title>
<link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --black:#0a0c0e; --void:#06080a; --surface:#11161c; --raised:#1a2028; --line:#243040;
  --red:#ff2929; --red-dim:#a00010; --cyan:#3df0ff; --cyan-dim:#1ba8b8; --blue:#0099ff;
  --magenta:#ff2bd6; --text:#e8f0f8; --muted:#5a6a7a; --danger:#ff5566; --ok:#3df0a8;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{
  font-family:'Rajdhani',sans-serif;background-color:var(--black);color:var(--text);
  font-size:15px;line-height:1.4;letter-spacing:0.3px;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  background-image:url('../assets/jezabelCity.png');
  background-size:cover;background-position:center;
  background-attachment:fixed;background-repeat:no-repeat;
}
/* dark scrim — sits BELOW UI (z:-1) so panel keeps its own contrast.
   Only dims the bg image where UI is transparent. */
.bg-scrim{
  position:fixed;inset:0;pointer-events:none;z-index:-1;
  background:linear-gradient(180deg,rgba(8,10,14,0.40) 0%,rgba(8,10,14,0.50) 50%,rgba(8,10,14,0.72) 100%);
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:100;
  background:repeating-linear-gradient(0deg,transparent 0,transparent 3px,rgba(255,41,41,0.015) 3px,rgba(255,41,41,0.015) 4px);
}
.panel{
  width:min(460px,94vw);background:var(--surface);border:1px solid var(--red);
  position:relative;z-index:5;
  box-shadow:0 0 0 1px rgba(255,41,41,0.15),0 30px 80px rgba(0,0,0,0.5),0 0 90px rgba(255,41,41,0.12);
  clip-path:polygon(16px 0,100% 0,100% calc(100% - 16px),calc(100% - 16px) 100%,0 100%,0 16px);
}
.panel::before{content:'';position:absolute;top:-1px;left:30px;width:80px;height:3px;background:var(--red);box-shadow:0 0 14px var(--red)}
.panel::after{content:'';position:absolute;bottom:-1px;right:30px;width:80px;height:3px;background:var(--cyan);box-shadow:0 0 14px var(--cyan)}
.panel-top{padding:28px 32px 22px;border-bottom:1px solid var(--line);position:relative}
.brand{
  font-family:'Orbitron',sans-serif;font-weight:900;font-size:26px;letter-spacing:5px;
  color:var(--red);text-shadow:0 0 14px rgba(255,41,41,0.6),0 0 28px rgba(255,41,41,0.3);
}
.brand .dot{color:var(--magenta)}
.brand-sub{font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:5px;color:var(--cyan);text-transform:uppercase;margin-top:6px}
.access-tag{
  position:absolute;top:24px;right:32px;padding:4px 10px;
  background:var(--void);border:1px solid var(--cyan);color:var(--cyan);
  font-family:'Orbitron',sans-serif;font-weight:700;font-size:9px;letter-spacing:2px;
}
.panel-body{padding:26px 32px 30px}
.field{margin-bottom:18px}
.field-label{
  font-family:'Orbitron',sans-serif;font-weight:700;font-size:10px;letter-spacing:3px;
  color:var(--cyan);text-transform:uppercase;display:block;margin-bottom:8px;
}
input[type=text],input[type=password]{
  width:100%;background:var(--void);border:1px solid var(--line);color:var(--text);
  font-family:'Rajdhani',sans-serif;font-weight:500;font-size:15px;padding:14px 16px;
  letter-spacing:1px;caret-color:var(--red);transition:border-color 0.15s,box-shadow 0.15s;
}
input:focus{outline:none;border-color:var(--red);box-shadow:0 0 0 1px var(--red),inset 0 0 18px rgba(255,41,41,0.06)}
.btn{
  width:100%;background:linear-gradient(180deg,rgba(255,41,41,0.2),rgba(160,0,16,0.08));
  border:1px solid var(--red);color:var(--red);
  font-family:'Orbitron',sans-serif;font-weight:800;font-size:13px;letter-spacing:4px;
  padding:16px;cursor:pointer;margin-top:22px;text-transform:uppercase;
  transition:all 0.18s;text-shadow:0 0 8px rgba(255,41,41,0.6);
  box-shadow:0 0 0 1px rgba(255,41,41,0.3),inset 0 0 20px rgba(255,41,41,0.08);
  clip-path:polygon(12px 0,100% 0,100% calc(100% - 12px),calc(100% - 12px) 100%,0 100%,0 12px);
}
.btn:hover{background:var(--red);color:var(--black);box-shadow:0 0 28px rgba(255,41,41,0.55);text-shadow:none}
.btn:disabled{opacity:.4;cursor:not-allowed}
.status{
  margin-top:16px;font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:2px;
  min-height:18px;line-height:1.6;white-space:pre-wrap;text-transform:uppercase;
}
.status.err{color:var(--danger)}
.status.ok{color:var(--ok)}
.status.dim{color:var(--muted)}
.blink{animation:blink .8s step-end infinite}
@keyframes blink{50%{opacity:0}}
.back{
  display:block;text-align:center;margin-top:22px;
  font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:3px;text-transform:uppercase;
  color:var(--muted);text-decoration:none;transition:color 0.15s;
}
.back:hover{color:var(--cyan);text-shadow:0 0 8px var(--cyan)}
</style>
</head>
<body>
<div class="bg-scrim"></div>
<div class="panel">
  <div class="panel-top">
    <div class="brand">JEZABEL<span class="dot">.</span>XYZ</div>
    <div class="brand-sub">⟨ DAE CONTROL ⟩</div>
    <div class="access-tag">ACCESS</div>
  </div>
  <div class="panel-body">
    <form id="login-form" onsubmit="doLogin(); return false;">
      <div class="field">
        <label class="field-label" for="u">USERNAME</label>
        <input type="text" id="u" name="username" autocomplete="off" autofocus placeholder="—">
      </div>
      <div class="field">
        <label class="field-label" for="p">PASSWORD</label>
        <input type="password" id="p" name="password" autocomplete="off" placeholder="—">
      </div>
      <button type="submit" class="btn" id="btn">▶ ENTER THE GRID</button>
    </form>
    <div class="status dim" id="status">&nbsp;</div>
    <a href="../" class="back">◂ BACK TO JEZABEL.XYZ</a>
  </div>
</div>
<script>
var AUTH={url:'https://sar1a.lempyra.com',clientId:'portal',scope:'read,write,companions',tokenKey:'jezabelxyz_token',userKey:'jezabelxyz_user'};
(function(){if(sessionStorage.getItem(AUTH.tokenKey))window.location.replace('../dashboard/');})();
document.addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});
async function doLogin(){
  var u=document.getElementById('u').value.trim(),p=document.getElementById('p').value;
  var btn=document.getElementById('btn'),st=document.getElementById('status');
  if(!u||!p){st.className='status err';st.textContent='⟨ CREDENTIALS REQUIRED ⟩';return;}
  btn.disabled=true;st.className='status dim';
  st.innerHTML='⟨ CONNECTING<span class="blink">_</span> ⟩';
  try{
    var r1=await fetch(AUTH.url+'/auth/authorize',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p,client_id:AUTH.clientId,scope:AUTH.scope})});
    var d1=await r1.json();if(!r1.ok)throw new Error(d1.detail||'auth failed');
    var code=d1.authorization_code||d1.code;if(!code)throw new Error('no code');
    var r2=await fetch(AUTH.url+'/auth/token',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({grant_type:'authorization_code',code:code,client_id:AUTH.clientId,client_secret:p})});
    var d2=await r2.json();if(!r2.ok)throw new Error(d2.detail||'token failed');
    sessionStorage.setItem(AUTH.tokenKey,d2.access_token);
    // The JWT payload IS the identity (sub/role/id/exp). Store it so the dashboard
    // sees role/id, not just the typed username. Falls back to {username} if undecodable.
    try{var _c=JSON.parse(atob(d2.access_token.split('.')[1]));
        sessionStorage.setItem(AUTH.userKey,JSON.stringify(Object.assign({username:u},_c)));}
    catch(e){sessionStorage.setItem(AUTH.userKey,JSON.stringify({username:u}));}
    st.className='status ok';st.textContent='⟨ ACCESS GRANTED ⟩\n⟨ LOADING DAE GRID… ⟩';
    setTimeout(function(){window.location.replace('../dashboard/');},600);
  }catch(e){st.className='status err';st.textContent='⟨ '+(e.message||e).toUpperCase()+' ⟩';btn.disabled=false;}
}
</script>
</body>
</html>
