<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src 'self' https://sar1a.lempyra.com; font-src 'self' https://fonts.gstatic.com; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src 'self' data: blob:;">
<title>jezabel — enter</title>
<link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=JetBrains+Mono:wght@300;400&display=swap">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'JetBrains Mono',monospace;background:#0a0a0a;color:#e84393;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 50% 50%,rgba(232,67,147,.04) 0%,transparent 70%);pointer-events:none;}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.07) 3px,rgba(0,0,0,.07) 4px);pointer-events:none;z-index:100;}
.panel{width:min(480px,96vw);border:1px solid #1e0a14;background:#080808;box-shadow:0 0 80px rgba(232,67,147,.06);}
.panel-top{padding:28px 28px 20px;border-bottom:1px solid #150a10;}
.brand{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:400;font-style:italic;color:#f0eae5;letter-spacing:2px;margin-bottom:4px;}
.brand span{color:#e84393;}
.brand-sub{font-size:9px;letter-spacing:4px;color:#333;text-transform:uppercase;}
.panel-body{padding:24px 28px 28px;}
.field{margin-bottom:16px;}
.field-label{font-size:9px;letter-spacing:3px;color:#442233;text-transform:uppercase;display:block;margin-bottom:6px;}
input[type=text],input[type=password]{
  width:100%;background:transparent;border:none;
  border-bottom:1px solid #1e0a14;color:#f0eae5;
  font-family:'JetBrains Mono',monospace;font-size:13px;
  padding:8px 4px;letter-spacing:1px;caret-color:#e84393;
}
input:focus{border-bottom-color:#e84393;}
.btn{
  width:100%;background:transparent;border:1px solid #e84393;color:#e84393;
  font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:3px;
  padding:12px;cursor:pointer;margin-top:20px;text-transform:uppercase;
  transition:background .2s,color .2s,box-shadow .2s;
}
.btn:hover{background:#e84393;color:#0a0a0a;box-shadow:0 0 30px rgba(232,67,147,.25);}
.btn:disabled{opacity:.3;cursor:not-allowed;}
.status{margin-top:14px;font-size:11px;min-height:16px;line-height:1.6;letter-spacing:.5px;white-space:pre;}
.status.err{color:#cc3333;} .status.ok{color:#e84393;} .status.dim{color:#2a1a22;}
.blink{animation:blink .8s step-end infinite;}
@keyframes blink{50%{opacity:0;}}
.back{display:block;text-align:center;margin-top:18px;font-size:10px;color:#1a0a14;text-decoration:none;letter-spacing:1px;}
.back:hover{color:#442233;}
</style>
</head>
<body>
<div class="panel">
  <div class="panel-top">
    <div class="brand">jeza<span>bel</span></div>
    <div class="brand-sub">AI companion studio</div>
  </div>
  <div class="panel-body">
    <form id="login-form" onsubmit="doLogin(); return false;">
    <div class="field">
      <label class="field-label" for="u">username</label>
      <input type="text" id="u" name="username" autocomplete="off" autofocus placeholder="_">
    </div>
    <div class="field">
      <label class="field-label" for="p">password</label>
      <input type="password" id="p" name="password" autocomplete="off" placeholder="_">
    </div>
    <button type="submit" class="btn" id="btn">[ enter the studio ]</button>
    </form>
    <div class="status dim" id="status">&nbsp;</div>
    <a href="../" class="back">← back to jezabel.xyz</a>
  </div>
</div>
<script>
var AUTH={url:'https://sar1a.lempyra.com',clientId:'portal',scope:'read,write,companions',tokenKey:'jezabelxyz_token',userKey:'jezabelxyz_user'};
(function(){if(sessionStorage.getItem(AUTH.tokenKey))window.location.replace('../dashboard/');})();
document.addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});
async function doLogin(){
  var u=document.getElementById('u').value.trim(),p=document.getElementById('p').value;
  var btn=document.getElementById('btn'),st=document.getElementById('status');
  if(!u||!p){st.className='status err';st.textContent='> credentials required';return;}
  btn.disabled=true;st.className='status dim';
  st.innerHTML='> connecting<span class="blink">_</span>';
  try{
    var r1=await fetch(AUTH.url+'/auth/authorize',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p,client_id:AUTH.clientId,scope:AUTH.scope})});
    var d1=await r1.json();if(!r1.ok)throw new Error(d1.detail||'auth failed');
    var code=d1.authorization_code||d1.code;if(!code)throw new Error('no code');
    var r2=await fetch(AUTH.url+'/auth/token',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({grant_type:'authorization_code',code:code,client_id:AUTH.clientId,client_secret:p})});
    var d2=await r2.json();if(!r2.ok)throw new Error(d2.detail||'token failed');
    sessionStorage.setItem(AUTH.tokenKey,d2.access_token);
    sessionStorage.setItem(AUTH.userKey,JSON.stringify({username:u}));
    st.className='status ok';st.textContent='> access granted\n> loading companions...';
    setTimeout(function(){window.location.replace('../dashboard/');},600);
  }catch(e){st.className='status err';st.textContent='> '+e.message;btn.disabled=false;}
}
</script>
</body>
</html>
