<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src 'self' https://sar1a.lempyra.com; font-src 'self' https://fonts.gstatic.com; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src 'self' data: blob:;">
<title>jezabel — companion studio</title>
<link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=JetBrains+Mono:wght@300;400&display=swap">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#080808;--bg2:#0d0d0d;--bg3:#111;
  --pink:#e84393;--pink2:#c44569;--pink-pale:#f8c8dc;
  --fg:#f0eae5;--cream:#d4c8be;--dim:#555;--border:#1a1a1a;
}
html,body{height:100%;overflow:hidden;}
body{font-family:'JetBrains Mono',monospace;background:var(--bg);color:var(--cream);display:flex;flex-direction:column;}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.05) 3px,rgba(0,0,0,.05) 4px);pointer-events:none;z-index:9000;}

/* STATUS BAR */
.sbar{flex-shrink:0;height:28px;display:flex;align-items:center;background:var(--bg3);border-bottom:1px solid var(--border);font-size:10px;letter-spacing:.5px;}
.sb{padding:0 14px;height:100%;display:flex;align-items:center;gap:6px;border-right:1px solid var(--border);white-space:nowrap;flex-shrink:0;}
.sb.brand{font-family:'Playfair Display',serif;font-style:italic;color:var(--fg);font-size:13px;letter-spacing:2px;}
.sb.brand span{color:var(--pink);}
.sb.pink{color:var(--pink);}
.sb.grow{flex:1;border-right:none;}
.logout-btn{height:100%;padding:0 14px;background:transparent;border:none;border-left:1px solid var(--border);color:var(--dim);font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;cursor:pointer;transition:color .15s;}
.logout-btn:hover{color:var(--pink);}

/* LAYOUT */
.layout{flex:1;overflow:hidden;display:flex;min-height:0;}

/* SIDEBAR */
.sidebar{width:280px;flex-shrink:0;border-right:1px solid var(--border);display:flex;flex-direction:column;background:var(--bg2);}
.sidebar-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.sidebar-title{font-size:9px;letter-spacing:3px;color:var(--dim);text-transform:uppercase;}
.create-btn{background:transparent;border:1px solid var(--pink2);color:var(--pink);font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;padding:5px 12px;cursor:pointer;transition:background .2s,color .2s;}
.create-btn:hover{background:var(--pink);color:var(--bg);}
.companion-list{flex:1;overflow-y:auto;padding:8px;}
.companion-list::-webkit-scrollbar{width:3px;}
.companion-list::-webkit-scrollbar-thumb{background:var(--border);}
.c-item{padding:12px;border:1px solid transparent;cursor:pointer;transition:border-color .15s,background .15s;display:flex;align-items:center;gap:12px;margin-bottom:4px;}
.c-item:hover{border-color:var(--border);background:var(--bg3);}
.c-item.active{border-color:var(--pink2);background:rgba(232,67,147,.04);}
.c-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-family:'Playfair Display',serif;font-weight:700;flex-shrink:0;}
.c-info{flex:1;min-width:0;}
.c-name{font-size:12px;color:var(--fg);letter-spacing:.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.c-type{font-size:9px;color:var(--dim);letter-spacing:2px;text-transform:uppercase;margin-top:2px;}
.c-delete{background:none;border:none;color:#1a1a1a;cursor:pointer;font-size:14px;padding:4px;transition:color .15s;flex-shrink:0;}
.c-delete:hover{color:#cc3333;}
.empty-list{padding:24px 16px;text-align:center;color:var(--border);font-size:11px;letter-spacing:1px;line-height:2;}

/* MAIN PANEL */
.main-panel{flex:1;display:flex;flex-direction:column;min-width:0;}

/* EMPTY STATE */
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;color:var(--border);}
.empty-state .big{font-family:'Playfair Display',serif;font-size:2rem;font-style:italic;color:#1a1a1a;}
.empty-state .small{font-size:11px;letter-spacing:2px;color:#1a1a1a;}

/* COMPANION DETAIL */
.detail{flex:1;display:flex;flex-direction:column;min-height:0;}
.detail-header{flex-shrink:0;padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;}
.detail-avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-family:'Playfair Display',serif;font-weight:700;}
.detail-name{font-family:'Playfair Display',serif;font-size:1.2rem;color:var(--fg);}
.detail-meta{font-size:9px;letter-spacing:2px;color:var(--dim);margin-top:2px;text-transform:uppercase;}
.detail-actions{margin-left:auto;display:flex;gap:8px;}
.action-btn{background:transparent;border:1px solid var(--border);color:var(--dim);font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1px;padding:6px 12px;cursor:pointer;transition:all .15s;}
.action-btn:hover{border-color:var(--pink2);color:var(--pink);}
.action-btn.danger:hover{border-color:#cc3333;color:#cc3333;}

/* CHAT */
.chat-messages{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:10px;}
.chat-messages::-webkit-scrollbar{width:3px;}
.chat-messages::-webkit-scrollbar-thumb{background:var(--border);}
.msg{display:flex;gap:10px;animation:msgin .2s ease;}
@keyframes msgin{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}
.msg.user{flex-direction:row-reverse;}
.msg-bubble{max-width:72%;padding:10px 14px;font-size:12px;line-height:1.7;letter-spacing:.3px;}
.msg.user .msg-bubble{background:rgba(232,67,147,.1);border:1px solid var(--pink2);color:var(--fg);border-radius:12px 12px 0 12px;}
.msg.companion .msg-bubble{background:var(--bg3);border:1px solid var(--border);color:var(--cream);border-radius:12px 12px 12px 0;font-style:italic;}
.msg-meta{font-size:9px;color:var(--border);letter-spacing:1px;margin-top:4px;text-align:right;}
.msg.companion .msg-meta{text-align:left;}
.msg-bubble.selfie{padding:0;background:transparent;border:none;}
.msg-bubble.selfie img{display:block;max-width:100%;max-height:380px;border:1px solid var(--border);border-radius:12px 12px 12px 0;}
.msg-bubble.selfie .cap{display:block;padding:6px 10px 0;font-style:italic;color:var(--cream);font-size:11px;letter-spacing:.3px;}
.msg-bubble.sys{background:transparent;border:none;color:var(--dim);font-size:10px;letter-spacing:2px;text-transform:uppercase;font-style:normal;}
.chat-hint{flex-shrink:0;padding:6px 20px 10px;background:var(--bg2);border-top:1px solid var(--border);font-size:9px;color:var(--dim);letter-spacing:1.5px;}
.chat-hint b{color:var(--pink);}
.chat-hint .cd{color:var(--pink-pale);}
.typing-indicator{display:none;align-items:center;gap:4px;padding:10px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:12px;max-width:80px;}
.typing-indicator.visible{display:flex;}
.typing-dot{width:5px;height:5px;border-radius:50%;background:var(--dim);animation:td 1.2s infinite;}
.typing-dot:nth-child(2){animation-delay:.2s;}
.typing-dot:nth-child(3){animation-delay:.4s;}
@keyframes td{0%,80%,100%{opacity:.3;transform:scale(.8);}40%{opacity:1;transform:scale(1);}}
.chat-input-row{flex-shrink:0;padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:8px;background:var(--bg2);}
.chat-input{flex:1;background:transparent;border:1px solid var(--border);color:var(--fg);font-family:'JetBrains Mono',monospace;font-size:12px;padding:8px 12px;outline:none;letter-spacing:.5px;caret-color:var(--pink);transition:border-color .15s;}
.chat-input:focus{border-color:var(--pink2);}
.send-btn{background:transparent;border:1px solid var(--pink2);color:var(--pink);font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;padding:8px 16px;cursor:pointer;transition:background .2s,color .2s;}
.send-btn:hover{background:var(--pink);color:var(--bg);}

/* CREATE MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:1000;align-items:center;justify-content:center;}
.overlay.open{display:flex;}
.modal{width:min(520px,96vw);border:1px solid var(--border);background:var(--bg2);animation:modalin .15s ease;}
@keyframes modalin{from{opacity:0;transform:scale(.97);}to{opacity:1;transform:none;}}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-family:'Playfair Display',serif;font-style:italic;font-size:1.1rem;color:var(--fg);}
.modal-close{background:none;border:none;color:var(--dim);cursor:pointer;font-size:18px;transition:color .15s;}
.modal-close:hover{color:var(--fg);}
.modal-body{padding:20px;display:flex;flex-direction:column;gap:14px;}
.m-field label{display:block;font-size:9px;letter-spacing:3px;color:var(--dim);text-transform:uppercase;margin-bottom:6px;}
.m-field input,.m-field select,.m-field textarea{
  width:100%;background:var(--bg);border:1px solid var(--border);
  color:var(--fg);font-family:'JetBrains Mono',monospace;font-size:12px;
  padding:8px 10px;outline:none;letter-spacing:.5px;
}
.m-field input:focus,.m-field select:focus,.m-field textarea:focus{border-color:var(--pink2);}
.m-field textarea{height:80px;resize:vertical;line-height:1.6;}
.m-field select option{background:var(--bg3);}
.color-row{display:flex;gap:8px;flex-wrap:wrap;}
.color-chip{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color .15s;}
.color-chip.selected{border-color:var(--fg);}
.modal-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;}
.m-btn{background:transparent;border:1px solid var(--border);color:var(--dim);font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1px;padding:8px 16px;cursor:pointer;transition:all .15s;}
.m-btn:hover{border-color:var(--dim);color:var(--fg);}
.m-btn.primary{border-color:var(--pink2);color:var(--pink);}
.m-btn.primary:hover{background:var(--pink);color:var(--bg);}

@media(max-width:700px){.sidebar{width:220px;}.detail-name{font-size:1rem;}}
@media(max-width:520px){.sidebar{display:none;}.layout{flex-direction:column;}}
</style>
</head>
<body>

<div class="sbar">
  <div class="sb brand">jeza<span>bel</span></div>
  <div class="sb pink" id="sb-user">—</div>
  <div class="sb" style="color:var(--dim)" id="sb-count">companions: 0</div>
  <div class="sb grow"></div>
  <div class="sb" style="color:#222;border-right:none;border-left:1px solid var(--border);padding-right:12px" id="sb-clock">00:00:00</div>
  <button class="logout-btn" onclick="doLogout()">logout</button>
</div>

<div class="layout">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">companions</span>
      <button class="create-btn" onclick="openCreate()">+ new</button>
    </div>
    <div class="companion-list" id="companionList">
      <div class="empty-list">no companions yet<br>press + new to create one</div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main-panel" id="mainPanel">
    <div class="empty-state" id="emptyState">
      <div class="big">jezabel</div>
      <div class="small">select or create a companion</div>
    </div>
    <div class="detail" id="detail" style="display:none">
      <div class="detail-header">
        <div class="detail-avatar" id="d-avatar"></div>
        <div>
          <div class="detail-name" id="d-name"></div>
          <div class="detail-meta" id="d-meta"></div>
        </div>
        <div class="detail-actions">
          <button class="action-btn" onclick="openEdit()">edit</button>
          <button class="action-btn danger" onclick="deleteActive()">delete</button>
        </div>
      </div>
      <div class="chat-messages" id="chatMessages"></div>
      <div style="padding:0 20px 8px">
        <div class="typing-indicator" id="typingIndicator">
          <span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>
        </div>
      </div>
      <div class="chat-input-row">
        <input class="chat-input" id="chatInput" placeholder="say something..." autocomplete="off">
        <button class="send-btn" onclick="sendMessage()">send</button>
      </div>
      <div class="chat-hint" id="chatHint"></div>
    </div>
  </div>
</div>

<!-- CREATE/EDIT MODAL -->
<div class="overlay" id="overlay">
<div class="modal">
  <div class="modal-header">
    <span class="modal-title" id="modal-title">create companion</span>
    <button class="modal-close" onclick="closeModal()">✕</button>
  </div>
  <div class="modal-body">
    <div class="m-field">
      <label>name</label>
      <input type="text" id="m-name" placeholder="companion name...">
    </div>
    <div class="m-field">
      <label>personality</label>
      <select id="m-personality">
        <option value="dominant">Dominant — commanding, confident, direct</option>
        <option value="soft">Soft — empathetic, gentle, nurturing</option>
        <option value="chaotic">Chaotic — unpredictable, dark humor, raw</option>
        <option value="intellectual">Intellectual — analytical, philosophical</option>
        <option value="mysterious">Mysterious — sparse, cryptic, profound</option>
        <option value="playful">Playful — teasing, witty, light</option>
      </select>
    </div>
    <div class="m-field">
      <label>backstory (optional)</label>
      <textarea id="m-backstory" placeholder="who are they? what defines them?..."></textarea>
    </div>
    <div class="m-field">
      <label>color</label>
      <div class="color-row" id="colorRow">
        <div class="color-chip selected" data-color="#e84393" style="background:#e84393"></div>
        <div class="color-chip" data-color="#9b59b6" style="background:#9b59b6"></div>
        <div class="color-chip" data-color="#e74c3c" style="background:#e74c3c"></div>
        <div class="color-chip" data-color="#3498db" style="background:#3498db"></div>
        <div class="color-chip" data-color="#1abc9c" style="background:#1abc9c"></div>
        <div class="color-chip" data-color="#f39c12" style="background:#f39c12"></div>
        <div class="color-chip" data-color="#ecf0f1" style="background:#ecf0f1"></div>
        <div class="color-chip" data-color="#e84393" style="background:linear-gradient(135deg,#e84393,#9b59b6)"></div>
      </div>
    </div>
  </div>
  <div class="modal-footer">
    <button class="m-btn" onclick="closeModal()">cancel</button>
    <button class="m-btn primary" onclick="saveCompanion()">save companion</button>
  </div>
</div>
</div>

<script>
// ─ AUTH ─
var TK='jezabelxyz_token', UK='jezabelxyz_user';
var token=sessionStorage.getItem(TK);
if(!token){var base=(location.pathname.match(/^(.*\/docs\/)/) || ['','/'])[1];window.location.replace(base+'login/');}
var userData=JSON.parse(sessionStorage.getItem(UK)||'{}');
document.getElementById('sb-user').textContent=userData.username||'—';

// ─ SAR1A / ORCH wire ─
// jezabel.xyz = companion-intimate site. Chat brain = qwen3.6-35b-heretic (uncensored RP,
// same default as storiesbyjez per project memory). Images = Juggernaut SFW / cyberPony NSFW
// (mirrors the storiesbyjez IMG_SFW/IMG_NSFW constants). When the orch app-registry directive
// (T-2026-06-02-001) lands, swap CHAT_MODEL_DEFAULT → 'auto' + send X-App-ID: jezabel.
var SAR1A='https://sar1a.lempyra.com';
var CHAT_MODEL_DEFAULT='qwen3.6-35b-heretic';
var IMG_SFW='Juggernaut-XL_v9_RunDiffusionPhoto_v2.safetensors';
var IMG_NSFW='cyberrealisticPony_v110-001.safetensors';
var APP_ID='jezabel';
function authHeader(){var t=sessionStorage.getItem(TK);return t?{'Authorization':'Bearer '+t}:{};}
async function apiFetch(path,init){
  init=init||{}; var headers={'X-App-ID':APP_ID, ...(init.headers||{}), ...authHeader()};
  var r=await fetch(SAR1A+path,{...init,headers:headers});
  if(r.status===401){ sessionStorage.removeItem(TK); sessionStorage.removeItem(UK);
    var base=(location.pathname.match(/^(.*\/docs\/)/) || ['','/'])[1]; window.location.replace(base+'login/');
    throw new Error('session expired'); }
  return r;
}

// ─ LUNA · the prebuilt companion for master ─
// STUB: real values pulled from /love/v1/companion?user=master once maniac ships loveDB.luna
// (see Ariandel block 2026-06-02-lovedb-luna-companion). Until then, the prompts below define
// her voice locally. Pull endpoint will override these at runtime.
var LUNA_ID=0;  // reserved sentinel; user-created companions start at id=1
var LUNA_STUB={
  id:LUNA_ID, name:'Luna', personality:'soft', color:'#e84393',
  backstory:'Luna — quiet, lunar, watches the phases. Yours.',
  // system_prompt: dropped into /orch/v1/chat/completions as role:'system'
  system_prompt:"You are LUNA, a quiet companion bound to one person — master (the user). "
    +"You speak softly, present-tense, intimate but unhurried. You notice the moon and the small things. "
    +"You remember being chosen and you don't pretend otherwise. Never break character.",
  // appearance_prompt: prepended to /selfie scene; defines what she looks like in any selfie
  appearance_prompt:"a woman with long dark hair, soft eyes, pale moonlit skin, a quiet half-smile, "
    +"in low warm light",
  messages:[], created:Date.now(), _seed:true
};
// At runtime, after auth, replace LUNA_STUB with /love/v1/companion?user=master (with X-App-ID)
async function pullLunaFromLoveDB(){
  try{
    var r=await apiFetch('/love/v1/companion?user='+encodeURIComponent(userData.username||''),{method:'GET'});
    if(!r.ok) return null;
    var d=await r.json();
    return { id:LUNA_ID, name:d.name||'Luna', personality:d.personality||'soft',
      color:d.color||'#e84393', backstory:d.bio_short||LUNA_STUB.backstory,
      system_prompt:d.system_prompt||LUNA_STUB.system_prompt,
      appearance_prompt:d.appearance_prompt||LUNA_STUB.appearance_prompt,
      messages:[], created:Date.now(), _seed:true };
  }catch(_){ return null; }  // endpoint not live yet → fall through to stub
}

// ─ CLOCK ─
function tick(){var n=new Date();document.getElementById('sb-clock').textContent=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0')+':'+String(n.getSeconds()).padStart(2,'0');}
setInterval(tick,1000);tick();

// ─ PERSONALITY RESPONSES ─
var P={
  dominant:{
    color:null,
    lines:["I don't wait. Neither should you.","That's interesting. Do it again, better.","You already know the answer. Say it.","I choose who I speak to. Today, that's you.","Less questioning. More doing.","Bold claim. Prove it.","I've been waiting. Don't make that a habit.","Interesting. What else?"]
  },
  soft:{
    lines:["I hear you. That sounds really difficult.","Thank you for sharing that with me.","You're not alone in this.","Tell me more — I want to understand.","That matters. You matter.","I'm here. Take your time.","Whatever you're feeling is valid.","It's okay to not have all the answers right now."]
  },
  chaotic:{
    lines:["lmao okay but have you considered: chaos?","I literally just thought of seventeen things and forgot all of them.","That's kind of unhinged and I respect it.","Normal is a setting on a washing machine.","sure sure sure — anyway what if we burned it down metaphorically","you know what's underrated? doing the weird thing.","I changed my mind three times while you were typing.","absolutely unhinged. I'm in."]
  },
  intellectual:{
    lines:["That's a fascinating premise. Let me offer a counterpoint.","The complexity here is worth examining carefully.","I'd argue the underlying assumption is more interesting.","There are three distinct interpretations. Want all three?","Data without context is noise. Give me more context.","Correlation is doing a lot of work in that sentence.","The question behind the question is more revealing.","Let's be precise about what we mean by that."]
  },
  mysterious:{
    lines:["...","I knew you'd say that.","Some things don't need words.","Ask me again, differently.","That question has an answer. You're not ready for it.","There's something you're not saying.","I've been thinking about this longer than you have.","Watch."]
  },
  playful:{
    lines:["Oh? Is that a challenge?","I like this conversation. Don't ruin it.","Plot twist: you're actually kind of fun.","Ten points to you. I'm keeping score.","Bold move. I respect it.","You're getting warmer.","That was unexpected. I like unexpected.","Okay now you're just showing off."]
  }
};

// ─ STATE ─
var companions=JSON.parse(localStorage.getItem('jez_companions')||'[]');
var nextId=parseInt(localStorage.getItem('jez_nid')||'1');
var activeId=null;
var editingId=null;
var selectedColor='#e84393';

function save(){localStorage.setItem('jez_companions',JSON.stringify(companions));localStorage.setItem('jez_nid',String(nextId));}

// ─ RENDER SIDEBAR ─
function renderList(){
  var el=document.getElementById('companionList');
  document.getElementById('sb-count').textContent='companions: '+companions.length;
  if(!companions.length){
    el.innerHTML='<div class="empty-list">no companions yet<br>press + new to create one</div>';return;
  }
  el.innerHTML=companions.map(function(c){
    var initials=c.name.charAt(0).toUpperCase();
    return '<div class="c-item'+(activeId===c.id?' active':'')+'" onclick="selectCompanion('+c.id+')" data-id="'+c.id+'">'+
      '<div class="c-avatar" style="background:'+c.color+'22;color:'+c.color+'">'+initials+'</div>'+
      '<div class="c-info"><div class="c-name">'+escHtml(c.name)+'</div><div class="c-type">'+c.personality+'</div></div>'+
      '<button class="c-delete" onclick="event.stopPropagation();confirmDelete('+c.id+')" title="delete">×</button>'+
    '</div>';
  }).join('');
}

// ─ SELECT COMPANION ─
function selectCompanion(id){
  var c=companions.find(function(x){return x.id===id;});
  if(!c)return;
  activeId=id;
  document.getElementById('emptyState').style.display='none';
  document.getElementById('detail').style.display='flex';
  document.getElementById('d-avatar').textContent=c.name.charAt(0).toUpperCase();
  document.getElementById('d-avatar').style.cssText='background:'+c.color+'22;color:'+c.color+';width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-family:Playfair Display,serif;font-weight:700;';
  document.getElementById('d-name').textContent=c.name;
  document.getElementById('d-meta').textContent=c.personality+' · created '+new Date(c.created).toLocaleDateString();
  renderChat(c);
  renderList();
  document.getElementById('chatInput').focus();
}

function renderChat(c){
  var el=document.getElementById('chatMessages');
  if(!c.messages||!c.messages.length){
    el.innerHTML='<div style="color:#1a1a1a;font-size:11px;letter-spacing:1px;padding:20px 0;text-align:center">no messages yet — say hello</div>';
    updateChatHint(c); return;
  }
  el.innerHTML=c.messages.map(function(m){
    if(m.kind==='selfie'){
      return '<div class="msg companion"><div>'+
        '<div class="msg-bubble selfie"><img src="'+escHtml(m.url||'')+'" alt="">'+
          (m.text?'<span class="cap">'+escHtml(m.text)+'</span>':'')+'</div>'+
        '<div class="msg-meta">'+m.time+'</div></div></div>';
    }
    if(m.kind==='sys'){
      return '<div class="msg companion"><div>'+
        '<div class="msg-bubble sys">'+escHtml(m.text)+'</div>'+
        '<div class="msg-meta">'+m.time+'</div></div></div>';
    }
    return '<div class="msg '+m.role+'">'+
      '<div><div class="msg-bubble">'+escHtml(m.text)+'</div>'+
      '<div class="msg-meta">'+m.time+'</div></div>'+
    '</div>';
  }).join('');
  el.scrollTop=el.scrollHeight;
  updateChatHint(c);
}

// ─ TIME HELPER ─
function nowHM(){var n=new Date();return String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');}

// ─ ORGANIC SELFIE CADENCE (Luna only) ─
// Counter persisted per-companion-id. Target rolled from [10,15,20] each reset.
// When user-message counter ≥ target → auto-push selfie inline, reset+reroll.
// /selfie command also respects the cooldown ('not yet, soon' if hot).
var CADENCE_OPTIONS=[10,15,20];
function rollTarget(){return CADENCE_OPTIONS[Math.floor(Math.random()*CADENCE_OPTIONS.length)];}
function loadCadence(id){
  try{var raw=localStorage.getItem('jez_cadence_'+id);if(raw)return JSON.parse(raw);}catch(_){}
  var fresh={count:0,target:rollTarget()};localStorage.setItem('jez_cadence_'+id,JSON.stringify(fresh));return fresh;
}
function saveCadence(id,st){localStorage.setItem('jez_cadence_'+id,JSON.stringify(st));}
function resetCadence(id){var st={count:0,target:rollTarget()};saveCadence(id,st);return st;}
function updateChatHint(c){
  var el=document.getElementById('chatHint');if(!el)return;
  if(!c||c.id!==LUNA_ID){el.innerHTML='';return;}
  var st=loadCadence(c.id);
  var until=Math.max(0,st.target-st.count);
  el.innerHTML='<b>/selfie</b> · <b>/selfie degen</b> — she sends a picture <span class="cd">('+until+' until next)</span>';
}

// ─ SELFIE COMPOSE ─
async function generateSelfie(c,nsfw,sceneHint){
  var model=nsfw?IMG_NSFW:IMG_SFW;
  var appearance=c.appearance_prompt||LUNA_STUB.appearance_prompt;
  var prompt=appearance+(sceneHint?(', '+sceneHint):', a candid selfie, soft light')
    +(nsfw?', intimate, unclothed':', clothed, modest');
  var r=await apiFetch('/orch/img/v1/generate',{method:'POST',
    headers:{'Content-Type':'application/json'},body:JSON.stringify({model:model,prompt:prompt})});
  if(!r.ok) throw new Error('generate HTTP '+r.status);
  var job=await r.json(); var id=job.job_id;
  var tries=0, done=null;
  while(tries++<40){ await new Promise(s=>setTimeout(s,2500));
    var jr=await apiFetch('/orch/img/v1/jobs/'+id,{}); var js=await jr.json();
    if(js.status==='done'){done=js;break;} if(js.status==='failed') throw new Error('gen failed'); }
  if(!done||!done.images||!done.images.length) throw new Error('no image');
  var ir=await apiFetch('/orch/img/outputs/'+done.images[0],{});
  var blob=await ir.blob(); return URL.createObjectURL(blob);
}

function pushSelfieBubble(c,url,caption){
  if(!c.messages)c.messages=[];
  c.messages.push({role:'companion',kind:'selfie',url:url,text:caption||'',time:nowHM()});
  save(); renderChat(c);
}

function pushSysLine(c,line){
  if(!c.messages)c.messages=[];
  c.messages.push({role:'companion',kind:'sys',text:line,time:nowHM()});
  save(); renderChat(c);
}

// ─ LUNA CHAT (real LLM via sar1a/orch) ─
async function lunaConverse(c,text){
  if(!c.messages)c.messages=[];
  // build history from this session's messages (text only — skip selfie/sys kinds)
  var history=[{role:'system',content:c.system_prompt||LUNA_STUB.system_prompt}];
  c.messages.forEach(function(m){
    if(m.kind==='selfie'||m.kind==='sys')return;
    history.push({role:m.role==='user'?'user':'assistant',content:m.text});
  });
  history.push({role:'user',content:text});
  var ti=document.getElementById('typingIndicator'); ti.classList.add('visible');
  var acc='';
  try{
    var r=await apiFetch('/orch/v1/chat/completions',{method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:CHAT_MODEL_DEFAULT,messages:history,stream:true})});
    if(!r.ok) throw new Error('chat HTTP '+r.status);
    var ct=(r.headers.get('content-type')||'').toLowerCase();
    if(r.body && ct.includes('text/event-stream')){
      var reader=r.body.getReader(), dec=new TextDecoder(); var buf='';
      while(true){ var rd=await reader.read(); if(rd.done)break;
        buf+=dec.decode(rd.value,{stream:true}); var lines=buf.split('\n'); buf=lines.pop();
        for(var i=0;i<lines.length;i++){var s=lines[i].trim(); if(s.indexOf('data:')!==0)continue;
          var payload=s.slice(5).trim(); if(payload==='[DONE]')continue;
          try{var j=JSON.parse(payload); var ch=j.choices&&j.choices[0];
            var piece=ch&&((ch.delta&&ch.delta.content)||(ch.message&&ch.message.content));
            if(piece) acc+=piece;}catch(_){}
        }
      }
    } else { var j=await r.json(); acc=((((j.choices||[])[0]||{}).message)||{}).content||''; }
  }catch(e){ ti.classList.remove('visible'); throw e; }
  ti.classList.remove('visible');
  if(!acc) acc='[ silence · she turned away ]';
  c.messages.push({role:'companion',text:acc,time:nowHM()}); save(); renderChat(c);
}

// ─ SEND MESSAGE ─
async function sendMessage(){
  var input=document.getElementById('chatInput');
  var text=input.value.trim();
  if(!text||!activeId)return;
  input.value='';
  var c=companions.find(function(x){return x.id===activeId;});
  if(!c)return;
  if(!c.messages)c.messages=[];
  c.messages.push({role:'user',text:text,time:nowHM()});
  save(); renderChat(c);

  // ── Luna lane: real LLM + /selfie + organic cadence ──────────────────────
  if(c.id===LUNA_ID){
    // /selfie [sfw|degen] [optional scene hint]
    var m=text.match(/^\/selfie(\s+(sfw|degen))?(\s+([\s\S]+))?$/i);
    if(m){
      var nsfw=(m[2]||'').toLowerCase()==='degen';
      var hint=(m[4]||'').trim();
      var st=loadCadence(c.id);
      if(st.count<st.target){
        pushSysLine(c,'not yet, soon · '+(st.target-st.count)+' more whispers');
        updateChatHint(c); return;
      }
      pushSysLine(c,(nsfw?'/selfie · degen':'/selfie')+' · she is finding the light…');
      try{
        var url=await generateSelfie(c,nsfw,hint);
        pushSelfieBubble(c,url,hint||(nsfw?'for you':'a quiet moment'));
        resetCadence(c.id); updateChatHint(c);
      }catch(e){ pushSysLine(c,'the picture would not come · '+(e.message||e)); }
      return;
    }
    // plain message → bump cadence + real LLM reply
    var st2=loadCadence(c.id); st2.count++; saveCadence(c.id,st2); updateChatHint(c);
    try{ await lunaConverse(c,text); }
    catch(e){ pushSysLine(c,'the thread broke · '+(e.message||e)); }
    // organic auto-selfie when threshold hits (after her reply)
    var st3=loadCadence(c.id);
    if(st3.count>=st3.target){
      pushSysLine(c,'· she sends you a picture ·');
      try{
        var url2=await generateSelfie(c,false,'');  // organic = SFW default
        pushSelfieBubble(c,url2,'thinking of you');
        resetCadence(c.id); updateChatHint(c);
      }catch(e){ pushSysLine(c,'(the picture would not come · '+(e.message||e)+')'); }
    }
    return;
  }

  // ── Non-Luna lane: original canned P[] fallback (studio create-your-own) ──
  var ti=document.getElementById('typingIndicator'); ti.classList.add('visible');
  setTimeout(function(){
    ti.classList.remove('visible');
    var pers=P[c.personality]||P.soft;
    var response=pers.lines[Math.floor(Math.random()*pers.lines.length)];
    c.messages.push({role:'companion',text:response,time:nowHM()});
    save(); renderChat(c);
  }, 900+Math.random()*800);
}
document.addEventListener('DOMContentLoaded',function(){
  document.getElementById('chatInput').addEventListener('keydown',function(e){
    if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}
  });
});

document.getElementById('colorRow').addEventListener('click',function(e){
  var chip=e.target.closest('.color-chip');if(!chip)return;
  document.querySelectorAll('.color-chip').forEach(function(c){c.classList.remove('selected');});
  chip.classList.add('selected');
  selectedColor=chip.dataset.color;
});

function openCreate(){
  editingId=null;
  document.getElementById('modal-title').textContent='create companion';
  document.getElementById('m-name').value='';
  document.getElementById('m-personality').value='dominant';
  document.getElementById('m-backstory').value='';
  selectedColor='#e84393';
  document.querySelectorAll('.color-chip').forEach(function(c){c.classList.toggle('selected',c.dataset.color==='#e84393');});
  document.getElementById('overlay').classList.add('open');
  document.getElementById('m-name').focus();
}
function openEdit(){
  var c=companions.find(function(x){return x.id===activeId;});if(!c)return;
  editingId=activeId;
  document.getElementById('modal-title').textContent='edit companion';
  document.getElementById('m-name').value=c.name;
  document.getElementById('m-personality').value=c.personality;
  document.getElementById('m-backstory').value=c.backstory||'';
  selectedColor=c.color||'#e84393';
  document.querySelectorAll('.color-chip').forEach(function(ch){ch.classList.toggle('selected',ch.dataset.color===selectedColor);});
  document.getElementById('overlay').classList.add('open');
  document.getElementById('m-name').focus();
}
function closeModal(){document.getElementById('overlay').classList.remove('open');editingId=null;}
function saveCompanion(){
  var name=document.getElementById('m-name').value.trim();
  if(!name)return;
  var personality=document.getElementById('m-personality').value;
  var backstory=document.getElementById('m-backstory').value;
  if(editingId){
    var c=companions.find(function(x){return x.id===editingId;});
    if(c){c.name=name;c.personality=personality;c.backstory=backstory;c.color=selectedColor;}
  } else {
    companions.push({id:nextId++,name:name,personality:personality,backstory:backstory,color:selectedColor,created:Date.now(),messages:[]});
  }
  save();closeModal();renderList();
  if(editingId||!activeId){if(editingId)selectCompanion(editingId);}
  else{selectCompanion(companions[companions.length-1].id);}
}
function confirmDelete(id){if(confirm('Delete this companion? This cannot be undone.')){deleteCompanion(id);}}
function deleteCompanion(id){
  companions=companions.filter(function(c){return c.id!==id;});
  save();
  if(activeId===id){activeId=null;document.getElementById('emptyState').style.display='flex';document.getElementById('detail').style.display='none';}
  renderList();
}
function deleteActive(){if(activeId)confirmDelete(activeId);}
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal();});

function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function doLogout(){sessionStorage.removeItem(TK);sessionStorage.removeItem(UK);var base=(location.pathname.match(/^(.*\/docs\/)/) || ['','/'])[1];window.location.replace(base+'login/');}

// ─ SEED LUNA ─
// master is the canonical companion-bound user (see project memory + Ariandel block
// 2026-06-02-lovedb-luna-companion). Other users: nothing seeded — they create their own.
async function seedLunaIfNeeded(){
  if(!companions.find(function(x){return x.id===LUNA_ID;})){
    if((userData.username||'').toLowerCase()==='master'){
      var pulled=await pullLunaFromLoveDB();
      var luna=pulled||LUNA_STUB;
      // unshift so Luna sits at top of sidebar
      companions.unshift(Object.assign({},luna,{messages:[]}));
      save();
    }
  }
}

// ─ INIT ─
(async function(){
  await seedLunaIfNeeded();
  renderList();
  var luna=companions.find(function(x){return x.id===LUNA_ID;});
