<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>jezabel.xyz · DAE</title>
<link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --black:#0a0c0e; --void:#06080a; --surface:#11161c; --raised:#1a2028; --line:#243040;
  --red:#ff2929; --red-dim:#a00010; --red-deep:#550000;
  --cyan:#3df0ff; --cyan-dim:#1ba8b8; --blue:#0099ff;
  --magenta:#ff2bd6; --magenta-dim:#aa1e92; --danger:#ff5566; --ok:#3df0a8;
  --text:#e8f0f8; --muted:#5a6a7a;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{
  font-family:'Rajdhani',sans-serif;background:var(--black);color:var(--text);
  font-size:15px;line-height:1.4;overflow:hidden;letter-spacing:0.3px;
  background-image:
    linear-gradient(135deg,#0a0c0e 0%,#0e1218 100%),
    radial-gradient(ellipse at 80% -20%,rgba(255,41,41,0.07),transparent 50%),
    radial-gradient(ellipse at 20% 120%,rgba(255,43,214,0.08),transparent 50%);
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:200;
  background:repeating-linear-gradient(0deg,transparent 0,transparent 3px,rgba(255,41,41,0.015) 3px,rgba(255,41,41,0.015) 4px);
}
button{font-family:'Rajdhani',sans-serif;cursor:pointer;border:none;background:none;color:inherit}
input,textarea{font-family:'Rajdhani',sans-serif}

/* CP77 angled clip-paths */
.notch-tl{clip-path:polygon(16px 0,100% 0,100% 100%,0 100%,0 16px)}
.notch-br{clip-path:polygon(0 0,100% 0,100% calc(100% - 16px),calc(100% - 16px) 100%,0 100%)}
.notch-both{clip-path:polygon(16px 0,100% 0,100% calc(100% - 16px),calc(100% - 16px) 100%,0 100%,0 16px)}
.shear-r{clip-path:polygon(0 0,calc(100% - 12px) 0,100% 100%,0 100%)}

/* TOP BAR */
.topbar{
  display:flex;align-items:center;gap:24px;padding:16px 28px;
  background:var(--void);border-bottom:2px solid var(--red);height:72px;position:relative;z-index:10;
}
.brand{
  font-family:'Orbitron',sans-serif;font-weight:900;font-size:22px;letter-spacing:4px;
  color:var(--red);text-shadow:0 0 14px rgba(255,41,41,0.6),0 0 28px rgba(255,41,41,0.3);
}
.brand .dot{color:var(--magenta)}
.bar-spacer{flex:1}
.user-block{display:flex;align-items:center;gap:14px}
.user-name{font-family:'Orbitron',sans-serif;font-weight:700;font-size:13px;letter-spacing:3px;color:var(--text)}
.user-role{
  padding:4px 10px;background:var(--surface);border:1px solid var(--cyan-dim);color:var(--cyan);
  font-family:'Orbitron',sans-serif;font-weight:600;font-size:10px;letter-spacing:2px;
}
.logout-btn{
  padding:8px 16px;background:transparent;border:1px solid var(--red);color:var(--red);
  font-family:'Orbitron',sans-serif;font-weight:600;font-size:10px;letter-spacing:2px;
}
.logout-btn:hover{background:var(--red);color:var(--black)}

/* TABS */
.tabs{
  display:flex;gap:0;background:var(--void);border-bottom:1px solid var(--line);
  padding:0 20px;height:60px;position:relative;z-index:9;
}
.tab{
  padding:0 32px;display:flex;align-items:center;gap:10px;
  font-family:'Orbitron',sans-serif;font-weight:700;font-size:13px;letter-spacing:3px;
  color:var(--muted);text-transform:uppercase;position:relative;transition:color 0.15s;
}
.tab .ic{font-size:18px;color:var(--cyan-dim)}
.tab:hover{color:var(--text)}
.tab:hover .ic{color:var(--cyan)}
.tab.active{color:var(--red)}
.tab.active .ic{color:var(--red);text-shadow:0 0 8px var(--red)}
.tab.active::after{
  content:'';position:absolute;bottom:0;left:24px;right:24px;height:3px;
  background:var(--red);box-shadow:0 0 12px var(--red);
}
.tab.hidden{display:none}

/* MAIN */
.main{height:calc(100vh - 72px - 60px);overflow-y:auto;padding:32px}
.view{display:none;max-width:1280px;margin:0 auto}
.view.active{display:block}

/* EMPTY */
.empty{
  margin:120px auto;text-align:center;max-width:520px;padding:48px;
  background:var(--surface);border:1px solid var(--line);
}
.empty .big{font-family:'Orbitron',sans-serif;font-size:24px;letter-spacing:5px;color:var(--red);text-transform:uppercase;display:block;margin-bottom:18px}
.empty .sub{font-size:14px;letter-spacing:1px;color:var(--muted)}

/* COMPANION VIEW — character-sheet layout */
.sheet{display:grid;grid-template-columns:340px 1fr;gap:24px}
.portrait-card{
  background:var(--surface);border:1px solid var(--cyan-dim);padding:24px;display:flex;flex-direction:column;gap:20px;
  position:relative;
}
.portrait-card::before{content:'';position:absolute;top:0;left:0;width:60px;height:3px;background:var(--cyan);box-shadow:0 0 10px var(--cyan)}
.portrait-card::after{content:'';position:absolute;bottom:0;right:0;width:60px;height:3px;background:var(--magenta);box-shadow:0 0 10px var(--magenta)}
.portrait{
  width:100%;aspect-ratio:3/4;background:var(--raised);border:1px solid var(--line);
  display:flex;align-items:center;justify-content:center;font-family:'Orbitron',sans-serif;
  font-weight:900;font-size:120px;color:var(--magenta);text-shadow:0 0 30px rgba(255,43,214,0.5);
  background-image:linear-gradient(135deg,rgba(255,43,214,0.06),rgba(61,240,255,0.06));
  position:relative;
}
.portrait-card .corners{position:absolute;inset:24px;pointer-events:none}
.corners::before,.corners::after{content:'';position:absolute;width:24px;height:24px;border:2px solid var(--red)}
.corners::before{top:0;left:0;border-right:0;border-bottom:0}
.corners::after{bottom:0;right:0;border-left:0;border-top:0}
.portrait-name{font-family:'Orbitron',sans-serif;font-weight:800;font-size:28px;letter-spacing:3px;color:var(--text);text-align:center}
.portrait-meta{
  display:flex;flex-direction:column;gap:8px;font-size:12px;letter-spacing:2px;text-transform:uppercase;
}
.portrait-meta .row{display:flex;justify-content:space-between;padding:6px 12px;background:var(--void);border-left:2px solid var(--red)}
.portrait-meta .k{color:var(--muted)}
.portrait-meta .v{color:var(--cyan);font-weight:600}
.portrait-meta .v.on{color:var(--ok)}
.portrait-meta .v.off{color:var(--muted)}

.actions{display:flex;flex-direction:column;gap:10px;margin-top:auto}
.action-btn{
  padding:18px 24px;background:linear-gradient(180deg,rgba(255,41,41,0.18),rgba(160,0,16,0.08));
  border:1px solid var(--red);color:var(--red);
  font-family:'Orbitron',sans-serif;font-weight:800;font-size:14px;letter-spacing:4px;text-transform:uppercase;
  text-align:left;display:flex;align-items:center;gap:14px;transition:all 0.15s;
  box-shadow:0 0 0 1px rgba(255,41,41,0.3),inset 0 0 20px rgba(255,41,41,0.08);
  clip-path:polygon(12px 0,100% 0,100% calc(100% - 12px),calc(100% - 12px) 100%,0 100%,0 12px);
  position:relative;text-shadow:0 0 8px rgba(255,41,41,0.6);
}
.action-btn .ic{font-size:20px;color:var(--red);text-shadow:0 0 10px var(--red)}
.action-btn:hover{
  background:var(--red);color:var(--black);transform:translateX(4px);
  box-shadow:0 0 24px rgba(255,41,41,0.6),inset 0 0 40px rgba(255,255,255,0.1);text-shadow:none;
}
.action-btn:hover .ic{color:var(--black);text-shadow:none}
.action-btn.magenta{
  background:linear-gradient(180deg,rgba(255,43,214,0.18),rgba(170,30,146,0.08));
  border-color:var(--magenta);color:var(--magenta);text-shadow:0 0 8px rgba(255,43,214,0.6);
  box-shadow:0 0 0 1px rgba(255,43,214,0.3),inset 0 0 20px rgba(255,43,214,0.08);
}
.action-btn.magenta .ic{color:var(--magenta);text-shadow:0 0 10px var(--magenta)}
.action-btn.magenta:hover{background:var(--magenta);color:var(--black);box-shadow:0 0 24px rgba(255,43,214,0.6);text-shadow:none}
.action-btn.magenta:hover .ic{color:var(--black);text-shadow:none}
.action-btn.blue{
  background:linear-gradient(180deg,rgba(0,153,255,0.18),rgba(27,168,184,0.08));
  border-color:var(--blue);color:var(--blue);text-shadow:0 0 8px rgba(0,153,255,0.6);
  box-shadow:0 0 0 1px rgba(0,153,255,0.3),inset 0 0 20px rgba(0,153,255,0.08);
}
.action-btn.blue .ic{color:var(--blue);text-shadow:0 0 10px var(--blue)}
.action-btn.blue:hover{background:var(--blue);color:var(--black);box-shadow:0 0 24px rgba(0,153,255,0.6);text-shadow:none}
.action-btn.blue:hover .ic{color:var(--black);text-shadow:none}

/* DETAIL form */
.detail-card{background:var(--surface);border:1px solid var(--line);padding:28px;display:flex;flex-direction:column;gap:22px}
.detail-head{display:flex;align-items:center;gap:14px;padding-bottom:18px;border-bottom:1px solid var(--line)}
.detail-head .label{font-family:'Orbitron',sans-serif;font-weight:800;font-size:14px;letter-spacing:5px;color:var(--red);text-transform:uppercase;flex:1}
.back-pill{
  display:none;padding:8px 16px;background:transparent;border:1px solid var(--magenta);color:var(--magenta);
  font-family:'Orbitron',sans-serif;font-weight:600;font-size:11px;letter-spacing:2px;text-transform:uppercase;
}
.back-pill:hover{background:var(--magenta);color:var(--black)}
.back-pill.visible{display:inline-block}

.field label{
  display:block;font-family:'Orbitron',sans-serif;font-weight:700;font-size:11px;letter-spacing:3px;
  color:var(--cyan);margin-bottom:10px;text-transform:uppercase;
}
.field label .req{color:var(--red)}
.field input,.field textarea{
  width:100%;background:var(--void);border:1px solid var(--line);color:var(--text);
  font-family:'Rajdhani',sans-serif;font-weight:500;font-size:14px;padding:14px 16px;line-height:1.6;
  transition:border-color 0.15s,box-shadow 0.15s;
}
.field input:focus,.field textarea:focus{
  outline:none;border-color:var(--red);box-shadow:0 0 0 1px var(--red);
}
.field textarea{resize:vertical;min-height:90px}
.field.row{display:flex;gap:14px}.field.row > div{flex:1}

.bindings{display:flex;flex-direction:column;gap:8px}
.binding{
  display:flex;align-items:center;gap:14px;padding:12px 16px;background:var(--void);border-left:3px solid var(--cyan);
  font-size:13px;
}
.binding .platform{
  padding:4px 10px;background:var(--cyan);color:var(--black);font-family:'Orbitron',sans-serif;
  font-weight:700;font-size:10px;letter-spacing:2px;text-transform:uppercase;
}
.binding .owner{flex:1;color:var(--text);font-weight:500}
.binding .status{padding:4px 10px;font-family:'Orbitron',sans-serif;font-weight:700;font-size:10px;letter-spacing:2px}
.binding .status.on{background:var(--ok);color:var(--black)}
.binding .status.off{background:var(--muted);color:var(--black)}
.binding .x{cursor:pointer;color:var(--red);font-size:16px;padding:0 4px}
.bind-add{
  padding:14px;border:2px dashed var(--cyan-dim);color:var(--cyan-dim);background:transparent;
  font-family:'Orbitron',sans-serif;font-weight:700;font-size:11px;letter-spacing:3px;text-transform:uppercase;
  text-align:center;transition:all 0.15s;
}
.bind-add:hover{border-color:var(--cyan);color:var(--cyan)}

.save-row{display:flex;justify-content:flex-end;padding-top:18px;border-top:1px solid var(--line)}
.save-btn{
  padding:14px 32px;background:var(--surface);border:1px solid var(--red-dim);color:var(--red-dim);
  font-family:'Orbitron',sans-serif;font-weight:800;font-size:13px;letter-spacing:4px;text-transform:uppercase;
  clip-path:polygon(12px 0,100% 0,100% calc(100% - 12px),calc(100% - 12px) 100%,0 100%,0 12px);
}
.save-btn.dirty{border-color:var(--red);color:var(--red);box-shadow:0 0 16px rgba(255,41,41,0.4)}
.save-btn.dirty:hover{background:var(--red);color:var(--black)}

/* ROSTER VIEW — card grid */
.roster-controls{
  display:flex;flex-wrap:wrap;gap:18px;margin-bottom:28px;padding:20px;background:var(--surface);border:1px solid var(--line);
}
.search-input{
  flex:1;min-width:280px;background:var(--void);border:1px solid var(--cyan-dim);color:var(--text);
  padding:12px 18px;font-family:'Rajdhani',sans-serif;font-weight:500;font-size:14px;
}
.search-input:focus{outline:none;border-color:var(--red)}
.chip-group{display:flex;align-items:center;gap:8px}
.chip-group .gl{font-family:'Orbitron',sans-serif;font-weight:700;font-size:10px;letter-spacing:2px;color:var(--cyan);text-transform:uppercase}
.chip{
  padding:8px 16px;background:var(--void);border:1px solid var(--line);color:var(--muted);
  font-family:'Orbitron',sans-serif;font-weight:600;font-size:10px;letter-spacing:2px;text-transform:uppercase;
  transition:all 0.15s;
}
.chip:hover{border-color:var(--cyan);color:var(--cyan)}
.chip.active{background:var(--red);color:var(--black);border-color:var(--red)}

.roster-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:18px}
.card{
  background:var(--surface);border:1px solid var(--cyan-dim);padding:20px;cursor:pointer;
  transition:all 0.15s;position:relative;display:flex;flex-direction:column;gap:14px;
}
.card::before{content:'';position:absolute;top:0;left:0;width:32px;height:2px;background:var(--cyan)}
.card::after{content:'';position:absolute;bottom:0;right:0;width:32px;height:2px;background:var(--magenta)}
.card:hover{border-color:var(--red);transform:translateY(-3px);box-shadow:0 8px 24px rgba(255,41,41,0.18)}
.card:hover::before{background:var(--red);box-shadow:0 0 10px var(--red)}
.card-portrait{
  width:100%;aspect-ratio:3/4;background:var(--raised);border:1px solid var(--line);
  display:flex;align-items:center;justify-content:center;font-family:'Orbitron',sans-serif;
  font-weight:900;font-size:72px;color:var(--magenta);text-shadow:0 0 24px rgba(255,43,214,0.5);
  background-image:linear-gradient(135deg,rgba(255,43,214,0.05),rgba(61,240,255,0.05));
}
.card-name{font-family:'Orbitron',sans-serif;font-weight:800;font-size:17px;letter-spacing:2px;color:var(--text);text-align:center}
.card-meta{display:flex;flex-direction:column;gap:6px;font-size:11px;letter-spacing:1.5px;text-transform:uppercase}
.card-meta .row{display:flex;justify-content:space-between;color:var(--muted)}
.card-meta .row .v{color:var(--cyan)}
.card-meta .row .v.magenta{color:var(--magenta)}
.card .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;vertical-align:middle}
.card .dot.on{background:var(--ok);box-shadow:0 0 8px var(--ok)}
.card .dot.off{background:var(--muted)}
.roster-empty{padding:80px;text-align:center;color:var(--muted);grid-column:1/-1;font-size:14px;letter-spacing:3px;text-transform:uppercase}

/* NEW DAE VIEW */
.new-card{
  max-width:560px;margin:60px auto;padding:36px;background:var(--surface);border:1px solid var(--magenta);
}
.new-card .title{font-family:'Orbitron',sans-serif;font-weight:800;font-size:18px;letter-spacing:5px;color:var(--magenta);text-transform:uppercase;margin-bottom:24px}

/* CHAT DRAWER */
.chat-drawer{
  position:fixed;bottom:0;left:0;right:0;height:0;background:var(--void);
  border-top:3px solid var(--red);transition:height 0.25s;z-index:50;overflow:hidden;
  box-shadow:0 -10px 40px rgba(255,41,41,0.2);
}
.chat-drawer.open{height:65vh}
.chat-head{display:flex;align-items:center;padding:18px 28px;background:var(--surface);border-bottom:1px solid var(--line)}
.chat-head .ctitle{font-family:'Orbitron',sans-serif;font-weight:800;font-size:14px;letter-spacing:4px;color:var(--red);flex:1;text-transform:uppercase}
.chat-head .close{
  width:36px;height:36px;background:transparent;border:1px solid var(--red);color:var(--red);
  font-size:18px;display:flex;align-items:center;justify-content:center;
}
.chat-head .close:hover{background:var(--red);color:var(--black)}
.chat-msgs{padding:24px 28px;overflow-y:auto;height:calc(100% - 140px);display:flex;flex-direction:column;gap:14px}
.msg{display:flex;gap:8px;max-width:75%}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.bubble{
  padding:14px 18px;background:var(--surface);border:1px solid var(--line);font-size:14px;line-height:1.6;font-weight:500;
}
.msg.user .bubble{border-color:var(--magenta);background:rgba(255,43,214,0.08)}
.msg.companion .bubble{border-color:var(--cyan);background:rgba(61,240,255,0.06)}
.bubble.sys{font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--red);background:transparent;border:none;padding:6px 0}
.bubble.selfie img{display:block;max-width:300px;border:1px solid var(--magenta)}
.bubble .cap{display:block;font-size:11px;letter-spacing:1.5px;color:var(--muted);margin-top:6px}
.chat-input-row{display:flex;gap:12px;padding:18px 28px;border-top:1px solid var(--line);background:var(--surface)}
.chat-input-row input{
  flex:1;background:var(--void);border:1px solid var(--line);color:var(--text);padding:14px 18px;font-size:14px;
}
.chat-input-row input:focus{outline:none;border-color:var(--red)}
.chat-send{
  padding:14px 28px;background:var(--red);border:1px solid var(--red);color:var(--black);
  font-family:'Orbitron',sans-serif;font-weight:800;font-size:13px;letter-spacing:3px;text-transform:uppercase;
  clip-path:polygon(12px 0,100% 0,100% calc(100% - 12px),calc(100% - 12px) 100%,0 100%,0 12px);
}
.chat-send:hover{background:var(--magenta);border-color:var(--magenta);color:var(--black)}
.typing{font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:3px;color:var(--cyan);padding:6px 28px;opacity:0;transition:opacity 0.2s;text-transform:uppercase}
.typing.visible{opacity:1}

.toast{
  position:fixed;bottom:24px;right:24px;padding:14px 20px;background:var(--surface);border:2px solid var(--cyan);
  color:var(--text);font-family:'Orbitron',sans-serif;font-weight:600;font-size:11px;letter-spacing:2px;text-transform:uppercase;
  z-index:300;animation:slideup 0.2s;max-width:360px;
  clip-path:polygon(12px 0,100% 0,100% calc(100% - 12px),calc(100% - 12px) 100%,0 100%,0 12px);
}
.toast.warn{border-color:var(--red);color:var(--red)}
.toast.err{border-color:var(--red);color:var(--red)}
@keyframes slideup{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}

@media(max-width:880px){
  .sheet{grid-template-columns:1fr}
  .tab{padding:0 20px;font-size:11px}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">JEZABEL<span class="dot">.</span>XYZ</div>
  <div class="bar-spacer"></div>
  <div class="user-block">
    <span class="user-name" id="userName">—</span>
    <span class="user-role" id="userRole">—</span>
    <button class="logout-btn" onclick="doLogout()">LOGOUT</button>
  </div>
</div>

<div class="tabs">
  <button class="tab active" data-tab="companion" onclick="setTab('companion')"><span class="ic">◆</span>MY COMPANION</button>
  <button class="tab hidden" data-tab="roster" id="tabRoster" onclick="setTab('roster')"><span class="ic">⌕</span>ROSTER</button>
  <button class="tab hidden" data-tab="new" id="tabNew" onclick="setTab('new')"><span class="ic">+</span>NEW DAE</button>
</div>

<div class="main">

  <!-- COMPANION VIEW -->
  <div class="view active" id="vCompanion">
    <div class="empty" id="emptyState"><span class="big">NO COMPANION BOUND</span><div class="sub">user-side creation parked behind admin C&C</div></div>
    <div class="sheet" id="sheet" style="display:none">
      <div class="portrait-card">
        <div class="portrait" id="dPortrait" style="position:relative">
          <div class="corners"></div>
          <span id="dPortraitLetter">—</span>
        </div>
        <div class="portrait-name" id="dName">—</div>
        <div class="portrait-meta">
          <div class="row"><span class="k">ID</span> <span class="v" id="dId">—</span></div>
          <div class="row"><span class="k">OWNER</span> <span class="v" id="dOwner">—</span></div>
          <div class="row"><span class="k">STATUS</span> <span class="v" id="dActive">—</span></div>
        </div>
        <div class="actions">
          <button class="action-btn" onclick="openChat()"><span class="ic">▶</span> CHAT</button>
          <button class="action-btn magenta" onclick="testSelfie()"><span class="ic">▶</span> SELFIE</button>

async function sendMsg(){
  var input=document.getElementById('chatInput');var text=input.value.trim();
  if(!text||!current)return;input.value='';
  var m=text.match(/^\/selfie(\s+(sfw|degen))?(\s+([\s\S]+))?$/i);
  if(m){
    var nsfw=(m[2]||'').toLowerCase()==='degen';var hint=(m[4]||'').trim();
    chatMessages.push({role:'companion',kind:'sys',text:'⟨ GENERATING · '+(nsfw?'DEGEN':'SFW')+' ⟩'});renderChat();
    try{var url=await genSelfie(current,nsfw,hint);chatMessages.push({role:'companion',kind:'selfie',url:url,cap:hint||current.name});}
    catch(e){chatMessages.push({role:'companion',kind:'sys',text:'⟨ IMAGE FAILED · '+(e.message||e)+' ⟩'});}
    renderChat();return;
  }
  chatMessages.push({role:'user',text:text});renderChat();
  var history=[{role:'system',content:current.system_prompt||''}];
  chatMessages.forEach(function(x){if(x.kind)return;history.push({role:x.role==='user'?'user':'assistant',content:x.text});});
  var ti=document.getElementById('typingI');ti.classList.add('visible');
  var acc='';
  try{
    var r=await apiFetch('/orch/v1/chat/completions',{method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:CHAT_MODEL_DEFAULT,messages:history,stream:true})});
    if(!r.ok)throw new Error('chat HTTP '+r.status);
    var ct=(r.headers.get('content-type')||'').toLowerCase();
    if(r.body && ct.includes('text/event-stream')){
      var reader=r.body.getReader(),dec=new TextDecoder();var buf='';
      while(true){var rd=await reader.read();if(rd.done)break;
        buf+=dec.decode(rd.value,{stream:true});var lines=buf.split('\n');buf=lines.pop();
        for(var i=0;i<lines.length;i++){var s=lines[i].trim();if(s.indexOf('data:')!==0)continue;
          var pay=s.slice(5).trim();if(pay==='[DONE]')continue;
          try{var j=JSON.parse(pay);var ch=j.choices&&j.choices[0];
            var piece=ch&&((ch.delta&&ch.delta.content)||(ch.message&&ch.message.content));
            if(piece)acc+=piece;}catch(_){}}}
    } else {var j=await r.json();acc=((((j.choices||[])[0]||{}).message)||{}).content||'';}
  }catch(e){ti.classList.remove('visible');chatMessages.push({role:'companion',kind:'sys',text:'⟨ THREAD BROKE · '+(e.message||e)+' ⟩'});renderChat();return;}
  ti.classList.remove('visible');
  chatMessages.push({role:'companion',text:acc||'⟨ SILENCE ⟩'});renderChat();
}
async function genSelfie(d,nsfw,hint){
  var model=nsfw?IMG_NSFW:IMG_SFW;
  var prompt=(d.appearance_prompt||'')+(hint?', '+hint:', a candid selfie, soft light')+(nsfw?', intimate, unclothed':', clothed');
  var r=await apiFetch('/orch/img/v1/generate',{method:'POST',
    headers:{'Content-Type':'application/json'},body:JSON.stringify({model:model,prompt:prompt})});
  if(!r.ok)throw new Error('gen HTTP '+r.status);
  var job=await r.json(),id=job.job_id,tries=0,done=null;
  while(tries++<40){await new Promise(s=>setTimeout(s,2500));
    var jr=await apiFetch('/orch/img/v1/jobs/'+id,{});var js=await jr.json();
    if(js.status==='done'){done=js;break;}if(js.status==='failed')throw new Error('gen failed');}
  if(!done||!done.images||!done.images.length)throw new Error('no image');
  var ir=await apiFetch('/orch/img/outputs/'+done.images[0],{});var blob=await ir.blob();
  return URL.createObjectURL(blob);
}
